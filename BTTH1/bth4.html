<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bai Tap 4</title>
  </head>
  <body>
    <h3>Basic Info</h3>
    <table border="0">
      <tr>
        <td>Employee</td>
        <td><p>9</p></td>
      </tr>
      <tr>
        <td>Last Name</td>
        <td><input type="text" /></td>
      </tr>
      <tr>
        <td>First Name</td>
        <td><input type="text" name="" id="" /></td>
      </tr>
      <tr>
        <td>Gender</td>
        <td>
          <input type="radio" name="d" id="" />Male <br />
          <input type="radio" name="d" id="" />Female <br />
          <input type="radio" name="d" id="" />XXX <br />
          <input type="radio" name="d" id="" />ZZZ <br />
        </td>
      </tr>
      <tr>
        <td>Title</td>
        <td>
          <input type="text" value="Sales Representavie" />
        </td>
      </tr>
      <tr>
        <td>Suffix</td>
        <td><input type="text" value="Ms." /></td>
      </tr>
      <tr>
        <td>BirthDate</td>
        <td><input type="date" /></td>
      </tr>
      <tr>
        <td>HireDate</td>
        <td><input type="date" name="" id="" /></td>
      </tr>
      <tr>
        <td>SSN #(if applicable)</td>
        <td><input type="text" /></td>
      </tr>
      <tr>
        <td>Report to</td>
        <td>
          <select>
            <option>Buchanan</option>
          </select>
        </td>
      </tr>
    </table>
    <table border="0">
      <h3>Contact Info</h3>
      <tr>
        <td>Email</td>
        <td>
          <input type="email" value="name@examle.com" />
        </td>
      </tr>
       <td>Address</td>
        <td><input type="text" value="7 Houndstooth Rd." /></td>
      </tr>
      <tr>
        <td>City</td>
        <td><input type="text" value="London" /></td>
      </tr>
      <tr>
        <td>Postal Code</td>
        <td><input type="text" value="WG2 7LT" /></td>
      </tr>
      <tr>
        <td>Country</td>
        <td>
          <select>
            <option>Russian Federation</option>
          </select>
        </td>
      </tr>
      <td>Home Phone</td>
        <td><input type="text" value="(234)234-2342" /></td>
      </tr>
      <tr>
        <td>Photo</td>
        <td>
            <input type="image" src=" alt=">
        </td>
      </tr>
    </table>
  </body>
</html>
