<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="form-tong">
      <p class="huong-dan">
        Get in touch with us by filling contact form below
      </p>

      <div class="hang-ngang">
        <input type="text" placeholder="* Enter your full name" />
        <input type="text" placeholder="* Enter your email address" />
      </div>

      <input type="text" placeholder="Enter your subject" class="o-nhap-dai" />

      <textarea
        placeholder="* Your message here..."
        class="o-nhap-dai"
      ></textarea>

      <div class="hang-cuoi">
        <button class="nut-gui">Send message</button>
        <span class="chu-thich"
          >* Please fill all required form field, thanks!</span
        >
      </div>
    </div>
  </body>
</html>
